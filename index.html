<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- MOBILE PILL NAV -->
  <nav class="pill-nav" id="pillNav" aria-label="Navegación de destinos"></nav>

  <!-- SIDEBAR (desktop) -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="brand-mark" id="sidebarCat"></div>
      <div class="wordmark">Chats<br>au Soleil</div>

        <div class="hero-wordmark">Chats au Soleil</div>

          <span class="pill">24–30 agosto 2026</span>
          <span class="pill">8 destinos</span>

      </div>

      <p class="quick-glance-caption">un vistazo antes de entrar en el detalle</p>
      <div class="quick-glance-row" id="quickGlanceRow"></div>

    <!-- DESTINATIONS -->
    <div id="destinations"></div>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-mark" id="footerCat"></div>
      <div class="footer-brand">Chats au Soleil</div>
      <div class="footer-line">
        dosier privado — verano 2026<br>

<script src="data.js"></script>
<script src="ornaments.js"></script>
